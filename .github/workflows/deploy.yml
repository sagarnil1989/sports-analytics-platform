name: Deploy All Components

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_infra:
        description: "Skip Terraform infra (true/false)"
        required: false
        default: "false"
      skip_functions:
        description: "Skip Function App deploy (true/false)"
        required: false
        default: "false"

env:
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  TF_BACKEND_RG: rg-tf-state
  TF_BACKEND_SA: tfstateramanuj
  TF_BACKEND_CONTAINER: tfstate

jobs:

# ──────────────────────────────────────────────────────────────
# INFRA — all modules run in parallel, each does plan → apply.
# ──────────────────────────────────────────────────────────────

  infra_1_bootstrap:
    name: "Infra 1 · Bootstrap"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_infra != 'true' }}
    defaults:
      run:
        working-directory: infra/1.bootstrap
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
      - name: Init
        run: terraform init -backend-config="resource_group_name=$TF_BACKEND_RG" -backend-config="storage_account_name=$TF_BACKEND_SA" -backend-config="container_name=$TF_BACKEND_CONTAINER"
      - name: Plan
        run: terraform plan -out=tfplan -lock=false
      - name: Apply
        run: terraform apply -auto-approve -lock=false tfplan

  infra_2_datalake:
    name: "Infra 2 · Data Lake"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_infra != 'true' }}
    defaults:
      run:
        working-directory: infra/2.datalake
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
      - name: Init
        run: terraform init -backend-config="resource_group_name=$TF_BACKEND_RG" -backend-config="storage_account_name=$TF_BACKEND_SA" -backend-config="container_name=$TF_BACKEND_CONTAINER"
      - name: Plan
        run: terraform plan -out=tfplan -lock=false
      - name: Apply
        run: terraform apply -auto-approve -lock=false tfplan

  infra_3_function_app:
    name: "Infra 3 · Function App"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_infra != 'true' }}
    defaults:
      run:
        working-directory: infra/3.function-app
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
      - name: Init
        run: terraform init -backend-config="resource_group_name=$TF_BACKEND_RG" -backend-config="storage_account_name=$TF_BACKEND_SA" -backend-config="container_name=$TF_BACKEND_CONTAINER"
      - name: Plan
        run: terraform plan -out=tfplan -lock=false
      - name: Apply
        run: terraform apply -auto-approve -lock=false tfplan

  infra_5_static_web:
    name: "Infra 5 · Static Web App"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_infra != 'true' }}
    defaults:
      run:
        working-directory: infra/5.static-web-app
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
      - name: Init
        run: terraform init -backend-config="resource_group_name=$TF_BACKEND_RG" -backend-config="storage_account_name=$TF_BACKEND_SA" -backend-config="container_name=$TF_BACKEND_CONTAINER"
      - name: Plan
        run: terraform plan -out=tfplan -lock=false
      - name: Apply
        run: terraform apply -auto-approve -lock=false tfplan

  infra_6_adf:
    name: "Infra 6 · ADF"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_infra != 'true' }}
    defaults:
      run:
        working-directory: infra/6.adf
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
      - name: Init
        run: terraform init -backend-config="resource_group_name=$TF_BACKEND_RG" -backend-config="storage_account_name=$TF_BACKEND_SA" -backend-config="container_name=$TF_BACKEND_CONTAINER"
      - name: Plan
        run: terraform plan -out=tfplan -lock=false
      - name: Apply
        run: terraform apply -auto-approve -lock=false tfplan

  infra_7_databricks:
    name: "Infra 7 · Databricks"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_infra != 'true' }}
    defaults:
      run:
        working-directory: infra/7.databricks
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
      - name: Init
        run: terraform init -backend-config="resource_group_name=$TF_BACKEND_RG" -backend-config="storage_account_name=$TF_BACKEND_SA" -backend-config="container_name=$TF_BACKEND_CONTAINER"
      - name: Plan
        run: terraform plan -out=tfplan -lock=false
      - name: Apply
        run: terraform apply -auto-approve -lock=false tfplan

  infra_8_adf_config:
    name: "Infra 8 · ADF Config"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_infra != 'true' }}
    defaults:
      run:
        working-directory: infra/8.adf-config
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
      - name: Init
        run: terraform init -backend-config="resource_group_name=$TF_BACKEND_RG" -backend-config="storage_account_name=$TF_BACKEND_SA" -backend-config="container_name=$TF_BACKEND_CONTAINER"
      - name: Plan
        run: terraform plan -out=tfplan -lock=false
      - name: Apply
        run: terraform apply -auto-approve -lock=false tfplan

  infra_9_ml:
    name: "Infra 9 · ML"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_infra != 'true' }}
    defaults:
      run:
        working-directory: infra/9.ml
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
      - name: Init
        run: terraform init -backend-config="resource_group_name=$TF_BACKEND_RG" -backend-config="storage_account_name=$TF_BACKEND_SA" -backend-config="container_name=$TF_BACKEND_CONTAINER"
      - name: Plan
        run: terraform plan -out=tfplan -lock=false
      - name: Apply
        run: terraform apply -auto-approve -lock=false tfplan

# ──────────────────────────────────────────────────────────────
# FUNCTION APPS — deploy in parallel once function-app infra is done.
# ──────────────────────────────────────────────────────────────

  deploy_ingestion:
    name: "Deploy · func-ramanuj-ingestion"
    needs: infra_3_function_app
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && github.event.inputs.skip_functions != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: src/functions/cricket_ingestion
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - uses: azure/login@v2
        with:
          creds: >-
            {
              "clientId": "${{ vars.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ vars.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ vars.AZURE_TENANT_ID }}"
            }

      - uses: Azure/functions-action@v1
        with:
          app-name: func-ramanuj-ingestion
          package: src/functions/cricket_ingestion
          scm-do-build-during-deployment: true
          enable-oryx-build: true

  deploy_display:
    name: "Deploy · func-ramanuj-display"
    needs: infra_3_function_app
    runs-on: ubuntu-latest
    if: ${{ always() && !failure() && !cancelled() && github.event.inputs.skip_functions != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: src/functions/cricket_display
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - uses: azure/login@v2
        with:
          creds: >-
            {
              "clientId": "${{ vars.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ vars.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ vars.AZURE_TENANT_ID }}"
            }

      - uses: Azure/functions-action@v1
        with:
          app-name: func-ramanuj-display
          package: src/functions/cricket_display
          scm-do-build-during-deployment: true
          enable-oryx-build: true
